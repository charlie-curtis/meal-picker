<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meal Picker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f0eb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      width: 460px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 1.8rem;
      color: #1a1a1a;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 28px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e5e5e5;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: #ff6b35;
    }

    button {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:hover { opacity: 0.85; }
    button:active { transform: scale(0.97); }

    .btn-add {
      background: #ff6b35;
      color: white;
    }

    .restaurant-list {
      list-style: none;
      margin-bottom: 24px;
      min-height: 40px;
    }

    .restaurant-list li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 6px;
      background: #fafafa;
      border: 2px solid #f0f0f0;
      font-size: 0.95rem;
      transition: background 0.3s, border-color 0.3s;
    }

    .restaurant-list li.winner {
      background: #fff4ee;
      border-color: #ff6b35;
      font-weight: 700;
      color: #ff6b35;
    }

    .remove-btn {
      background: none;
      color: #ccc;
      font-size: 1.1rem;
      padding: 0 4px;
      line-height: 1;
    }

    .remove-btn:hover {
      color: #e53e3e;
      opacity: 1;
    }

    .pick-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .btn-pick {
      width: 100%;
      padding: 14px;
      background: #1a1a1a;
      color: white;
      font-size: 1.05rem;
      border-radius: 10px;
    }

    .result {
      font-size: 1.1rem;
      color: #ff6b35;
      font-weight: 700;
      text-align: center;
      min-height: 1.5em;
    }

    .empty-hint {
      color: #bbb;
      font-size: 0.85rem;
      text-align: center;
      padding: 8px 0;
    }

  </style>
</head>
<body>
  <div class="card">
    <h1>Meal Picker</h1>
    <p class="subtitle">Add your options and let fate decide.</p>

    <div class="input-row">
      <input id="restaurantInput" type="text" placeholder="Restaurant name…" />
      <button class="btn-add" onclick="addRestaurant()">Add</button>
    </div>

    <ul id="restaurantList" class="restaurant-list">
      <li class="empty-hint" id="emptyHint">No restaurants yet.</li>
    </ul>

    <div class="pick-row">
      <button class="btn-pick" onclick="pickRandom()">Pick one</button>
      <div class="result" id="result"></div>
    </div>
  </div>

  <script>
    const restaurants = [];

    const input = document.getElementById('restaurantInput');
    const list = document.getElementById('restaurantList');
    const result = document.getElementById('result');
    const emptyHint = document.getElementById('emptyHint');

    input.addEventListener('keydown', e => { if (e.key === 'Enter') addRestaurant(); });

    function addRestaurant() {
      const name = input.value.trim();
      if (!name) return;
      restaurants.push(name);
      input.value = '';
      render();
      input.focus();
    }

    function removeRestaurant(i) {
      restaurants.splice(i, 1);
      result.textContent = '';
      render();
    }

    function render() {
      list.innerHTML = '';
      if (restaurants.length === 0) {
        list.appendChild(emptyHint);
        return;
      }
      restaurants.forEach((name, i) => {
        const li = document.createElement('li');
        li.textContent = name;
        const btn = document.createElement('button');
        btn.textContent = '×';
        btn.className = 'remove-btn';
        btn.onclick = () => removeRestaurant(i);
        li.appendChild(btn);
        list.appendChild(li);
      });
    }

    function pickRandom() {
      if (restaurants.length === 0) {
        result.textContent = 'Add some restaurants first!';
        return;
      }
      const items = list.querySelectorAll('li');
      items.forEach(li => li.classList.remove('winner'));
      result.textContent = '';

      let i = 0;
      const total = restaurants.length;
      const duration = 1200;
      const interval = setInterval(() => {
        items.forEach(li => li.classList.remove('winner'));
        items[i % total].classList.add('winner');
        i++;
      }, 80);

      setTimeout(() => {
        clearInterval(interval);
        const winner = Math.floor(Math.random() * total);
        items.forEach(li => li.classList.remove('winner'));
        items[winner].classList.add('winner');
        result.textContent = `Let's go to ${restaurants[winner]}!`;
      }, duration);
    }
  </script>
</body>
</html>
